<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>玉见神权 · 石家河H5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #1e1a17;
            font-family: 'PingFang SC', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: pan-y;
        }

        #app {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 820px;
            background: #2c241e;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            margin: 8px;
        }

        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #3a2e26;
            transition: opacity 0.6s ease, transform 0.6s ease;
            will-change: transform, opacity;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .scene-hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.96);
        }

        /* 漫画卡片 */
        .comic-page {
            flex-shrink: 0;
            width: 100%;
            padding: 24px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #3a2e26;
            border-bottom: 2px solid #5a4a3e;
            min-height: 100vh;
            justify-content: center;
        }

        .comic-panel {
            background: #4d3d32;
            border-radius: 20px;
            padding: 18px 16px 20px;
            box-shadow: inset 0 -4px 0 #2f231c, 0 8px 20px rgba(0,0,0,0.4);
            border: 1px solid #7a6456;
        }

        .panel-title {
            font-size: 22px;
            font-weight: 700;
            color: #eedcc8;
            letter-spacing: 4px;
            text-shadow: 0 2px 0 #2f1f16;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-sub {
            font-size: 14px;
            color: #b79a86;
            border-left: 3px solid #c29a7a;
            padding-left: 12px;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .panel-img {
            width: 100%;
            border-radius: 16px;
            background: #2f241e;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #b4947a;
            box-shadow: inset 0 0 0 1px #6a5546;
            margin: 8px 0 4px;
            background-image: radial-gradient(circle at 30% 40%, #5b463a 0%, #2f241e 90%);
            position: relative;
            overflow: hidden;
        }
        .panel-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .panel-img span {
            background: rgba(30, 22, 18, 0.6);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            backdrop-filter: blur(2px);
            border: 1px solid #b4947a;
            color: #f0e0d0;
        }

        .panel-text {
            font-size: 15px;
            line-height: 1.7;
            color: #f0e2d6;
            background: rgba(50, 38, 30, 0.6);
            padding: 12px 14px;
            border-radius: 14px;
            border-left: 3px solid #c29a7a;
            margin-top: 6px;
        }

        .panel-text strong {
            color: #f7d7b0;
            font-weight: 600;
        }

        .dialogue {
            background: #2f241e;
            border-radius: 30px 30px 30px 4px;
            padding: 14px 18px;
            color: #f0e0d0;
            font-size: 15px;
            margin: 6px 0;
            border: 1px solid #7a6456;
            box-shadow: 0 4px 0 #1f1712;
        }

        .dialogue-right {
            border-radius: 30px 30px 4px 30px;
            background: #4d3a2e;
            margin-left: 12px;
        }

        /* 神兽试炼 */
        .trial-box {
            background: #2f241e;
            border-radius: 28px;
            padding: 18px 16px 24px;
            border: 2px solid #b4947a;
            box-shadow: 0 0 20px rgba(194, 154, 122, 0.2);
            margin: 10px 0;
        }

        .beast-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .beast-icon {
            font-size: 40px;
            background: #4d3d32;
            width: 60px;
            height: 60px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #b4947a;
        }

        .beast-name {
            font-size: 20px;
            font-weight: 700;
            color: #f0dcc8;
        }

        .beast-desc {
            color: #b79a86;
            font-size: 14px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 14px 0 6px;
        }

        .option-btn {
            background: #4d3d32;
            padding: 14px 16px;
            border-radius: 40px;
            border: 1px solid #7a6456;
            color: #f0e2d6;
            font-size: 15px;
            text-align: left;
            transition: all 0.15s;
            box-shadow: 0 4px 0 #1f1712;
            cursor: pointer;
            font-weight: 500;
        }

        .option-btn:active {
            transform: scale(0.97);
            box-shadow: 0 1px 0 #1f1712;
        }

        .option-btn.correct {
            background: #3f6b4a;
            border-color: #8fc99c;
            box-shadow: 0 0 16px #6faa7a;
        }

        .option-btn.wrong {
            background: #6b3f3f;
            border-color: #b47a7a;
        }

        .feedback {
            font-size: 15px;
            padding: 10px 12px;
            border-radius: 30px;
            margin-top: 8px;
            text-align: center;
            background: #2f241e;
            border: 1px solid #7a6456;
            color: #eedcc8;
        }

        .btn-primary {
            background: #b4947a;
            border: none;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 18px;
            color: #1e1a17;
            box-shadow: 0 6px 0 #6a5546;
            transition: all 0.1s;
            cursor: pointer;
            text-align: center;
            margin: 12px 0 6px;
            letter-spacing: 2px;
        }

        .btn-primary:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #6a5546;
        }

        .btn-secondary {
            background: #4d3d32;
            border: 1px solid #7a6456;
            color: #eedcc8;
        }

        .badge {
            display: inline-block;
            background: #c29a7a;
            color: #1e1a17;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 结尾海报 */
        .poster-box {
            background: #2f241e;
            border-radius: 32px;
            padding: 24px 18px;
            border: 2px solid #b4947a;
            text-align: center;
            box-shadow: 0 0 30px rgba(194, 154, 122, 0.15);
        }

        .poster-title {
            font-size: 28px;
            font-weight: 800;
            color: #f0dcc8;
            letter-spacing: 6px;
            text-shadow: 0 2px 0 #2f1f16;
        }

        .poster-sub {
            color: #b79a86;
            margin: 8px 0 16px;
        }

        .hidden-scroll {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .hidden-scroll::-webkit-scrollbar {
            display: none;
        }

        .fade-in {
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .glow {
            animation: glowPulse 2s infinite alternate;
        }
        @keyframes glowPulse {
            0% { filter: drop-shadow(0 0 4px #b4947a); }
            100% { filter: drop-shadow(0 0 20px #dbb594); }
        }

        /* 进度条 */
        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 12px 0 4px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: #5a4a3e;
            transition: 0.3s;
        }
        .dot.active {
            background: #c29a7a;
            width: 24px;
        }
        .dot.done {
            background: #7a6456;
        }

        /* 适配 */
        @media (max-width: 440px) {
            .comic-page { padding: 16px 12px; }
            .panel-title { font-size: 20px; }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- 场景容器，由 js 动态渲染 -->
    <div id="sceneContainer" class="hidden-scroll" style="width:100%;height:100%;overflow-y:auto;scroll-behavior:smooth;"></div>
</div>

<script>
    (function(){
        // ----- 数据：本地相对路径img文件夹，直接写图片文件名 -----
        const STORY = {
            // 第一幕：觉醒
            pages: [
                {
                    id: 'm1',
                    title: '🏛️ 玉见神权',
                    subtitle: '博物馆 · 邂逅',
                    imgEmoji: '🗿',
                    imgUrl: "img/museum1.jpg",
                    text: '「那天，我在博物馆遇见了它——一件来自四千年前的玉人头像。」<br>展柜里，玉人头像散发着幽幽微光，仿佛在呼唤。',
                    dialogue: null,
                },
                {
                    id: 'm2',
                    title: '✨ 神秘光芒',
                    subtitle: '触碰 · 穿越',
                    imgEmoji: '✨',
                    imgUrl: "img/light2.jpg",
                    text: '当我伸手触碰玻璃的那一刻，奇异的事情发生了……<br>光芒吞噬了视线，时空开始旋转。',
                    dialogue: null,
                },
                {
                    id: 'm3',
                    title: '🌾 史前石家河',
                    subtitle: '四千年前',
                    imgEmoji: '🏞️',
                    imgUrl: "img/city3.jpg",
                    text: '再次醒来时，我来到了四千年前——石家河。<br>远处是巍峨的城墙，天空中飞着从未见过的鸟。',
                    dialogue: '“这……这是哪里？”',
                },
            ],
            // 第二幕：玉匠之路 (5张漫画)
            crafts: [
                {
                    id: 'c1',
                    title: '🏠 作坊醒来',
                    subtitle: '老玉匠的救赎',
                    imgEmoji: '🪚',
                    imgUrl: "img/workshop4.jpg",
                    text: '在一间简陋的木屋里醒来，身边坐着一位白胡子老玉匠。',
                    dialogue: '老玉匠：“年轻人，你醒啦。你晕倒在外面，是我把你救回来的。”',
                },
                {
                    id: 'c2',
                    title: '🐦 玉凤之艺',
                    subtitle: '剔地阳纹',
                    imgEmoji: '🐦',
                    imgUrl: "img/phoenix5.jpg",
                    text: '老玉匠捧出一只玉凤，羽毛纹路根根凸起，精致无比。',
                    dialogue: '“这叫剔地阳纹——把周围玉料磨下去，花纹就鼓起来了。”',
                },
                {
                    id: 'c3',
                    title: '🤲 指尖触碰',
                    subtitle: '玉魂共鸣',
                    imgEmoji: '✨',
                    imgUrl: "img/touch6.jpg",
                    text: '好奇地伸出手，指尖慢慢靠近玉凤……',
                    dialogue: '“好漂亮的玉凤……摸摸看应该没关系吧。”',
                },
                {
                    id: 'c4',
                    title: '💚 玉凤认主',
                    subtitle: '青芒乍现',
                    imgEmoji: '🌟',
                    imgUrl: "img/glow7.jpg",
                    text: '触碰的瞬间，玉凤发出柔和的青色光芒！暖流涌遍全身，耳边传来凤鸣。',
                    dialogue: '老玉匠激动：“这……这是玉认主了！”',
                },
                {
                    id: 'c5',
                    title: '🌲 踏上征途',
                    subtitle: '神兽试炼',
                    imgEmoji: '🗡️',
                    imgUrl: "img/mountain8.jpg",
                    text: '手握玉凤，走向后山。三位神兽守候着神权试炼。',
                    dialogue: '老玉匠：“通过试炼，你就是真正的玉神使者。”',
                },
            ],
        };

        // 题库
        const QUIZ = [
            {
                beast: '玉凤',
                icon: '🐦',
                question: '石家河文化距今大约有多少年历史？',
                options: ['约2000年', '约4000-6000年', '约8000年'],
                answer: 1,
                hint: '石家河文化距今约6000-4000年。'
            },
            {
                beast: '玉虎',
                icon: '🐯',
                question: '石家河玉器最具代表性的核心工艺是什么？',
                options: ['阴线刻', '剔地阳纹', '透雕'],
                answer: 1,
                hint: '剔地阳纹是石家河玉器的标志性工艺。'
            },
            {
                beast: '神人头像',
                icon: '🗿',
                question: '集神权与王权于一身的统治者被称为什么？',
                options: ['大祭司', '巫王', '部落首领'],
                answer: 1,
                hint: '“巫王”同时掌握神权与王权。'
            }
        ];

        // ----- 状态 -----
        let currentScene = 'intro'; // intro | story | craft | quiz | ending
        let currentStep = 0;        // 故事/工匠/问答索引
        let quizIndex = 0;
        let quizResult = [false, false, false];
        let isAnswering = false;

        const container = document.getElementById('sceneContainer');

        // ----- 渲染函数 -----
        function render() {
            if (currentScene === 'intro') renderIntro();
            else if (currentScene === 'story') renderStory();
            else if (currentScene === 'craft') renderCraft();
            else if (currentScene === 'quiz') renderQuiz();
            else if (currentScene === 'ending') renderEnding();
            // 滚动到顶部
            container.scrollTop = 0;
        }

        // 介绍页
        function renderIntro() {
            container.innerHTML = `
                <div class="comic-page" style="justify-content:center; align-items:center; background: #1e1a17;">
                    <div style="text-align:center; padding:20px 10px;">
                        <div style="font-size:80px; filter:drop-shadow(0 0 30px #b4947a);">🗿</div>
                        <h1 style="color:#f0dcc8; font-size:36px; letter-spacing:8px; margin:20px 0 8px;">玉见神权</h1>
                        <p style="color:#b79a86; font-size:16px; letter-spacing:4px;">石家河文化 · H5动画</p>
                        <div style="margin:30px 0; border-top:1px solid #5a4a3e; width:60px; margin-left:auto; margin-right:auto;"></div>
                        <p style="color:#c29a7a; font-size:14px; line-height:1.8; max-width:260px; margin:0 auto;">穿越四千年，探寻玉器与神权的秘密</p>
                        <button class="btn-primary" style="margin-top:40px; width:80%;" onclick="startStory()">开始旅程</button>
                        <p style="color:#6a5546; font-size:12px; margin-top:20px;">—— 玉为灵媒 · 巫王合一 ——</p>
                    </div>
                </div>
            `;
        }

        // 第一幕：故事
        function renderStory() {
            const p = STORY.pages[currentStep];
            if (!p) { currentStep = 0; return renderStory(); }
            const isLast = currentStep === STORY.pages.length - 1;
            // 判断有无本地图片，有则加载图片，无则显示emoji
            let imgHtml = p.imgUrl ? `<img src="${p.imgUrl}" alt="${p.title}">` : p.imgEmoji;
            container.innerHTML = `
                <div class="comic-page fade-in">
                    <div class="comic-panel">
                        <div class="panel-title">${p.title}</div>
                        <div class="panel-sub">${p.subtitle}</div>
                        <div class="panel-img">${imgHtml}</div>
                        <div class="panel-text">${p.text}</div>
                        ${p.dialogue ? `<div class="dialogue">${p.dialogue}</div>` : ''}
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px;">
                            <span class="badge">${currentStep+1} / ${STORY.pages.length}</span>
                            <button class="btn-primary" style="padding:10px 28px; font-size:15px;" onclick="${isLast ? 'startCraft()' : 'nextStory()'}">
                                ${isLast ? '进入玉匠之路 →' : '下一页 →'}
                            </button>
                        </div>
                    </div>
                    <div class="progress-bar">
                        ${STORY.pages.map((_,i) => `<span class="dot ${i===currentStep?'active':''} ${i<currentStep?'done':''}"></span>`).join('')}
                    </div>
                </div>
            `;
        }

        // 第二幕：玉匠之路 (5张)
        function renderCraft() {
            const p = STORY.crafts[currentStep];
            if (!p) { currentStep = 0; return renderCraft(); }
            const isLast = currentStep === STORY.crafts.length - 1;
            let imgHtml = p.imgUrl ? `<img src="${p.imgUrl}" alt="${p.title}">` : p.imgEmoji;
            container.innerHTML = `
                <div class="comic-page fade-in">
                    <div class="comic-panel">
                        <div class="panel-title">${p.title}</div>
                        <div class="panel-sub">${p.subtitle}</div>
                        <div class="panel-img">${imgHtml}</div>
                        <div class="panel-text">${p.text}</div>
                        ${p.dialogue ? `<div class="dialogue">${p.dialogue}</div>` : ''}
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px;">
                            <span class="badge">玉匠之路 ${currentStep+1}/${STORY.crafts.length}</span>
                            <button class="btn-primary" style="padding:10px 28px; font-size:15px;" onclick="${isLast ? 'startQuiz()' : 'nextCraft()'}">
                                ${isLast ? '前往神兽试炼 →' : '下一页 →'}
                            </button>
                        </div>
                    </div>
                    <div class="progress-bar">
                        ${STORY.crafts.map((_,i) => `<span class="dot ${i===currentStep?'active':''} ${i<currentStep?'done':''}"></span>`).join('')}
                    </div>
                </div>
            `;
        }

        // 第三幕：试炼 (问答)
        function renderQuiz() {
            if (quizIndex >= QUIZ.length) {
                // 全部通过 -> 结局
                currentScene = 'ending';
                render();
                return;
            }
            const q = QUIZ[quizIndex];
            const passed = quizResult[quizIndex];
            if (passed) {
                // 如果这关已过，直接下一题
                quizIndex++;
                renderQuiz();
                return;
            }

            const isLastQuiz = quizIndex === QUIZ.length - 1;
            container.innerHTML = `
                <div class="comic-page fade-in" style="justify-content:center;">
                    <div class="trial-box">
                        <div class="beast-header">
                            <div class="beast-icon">${q.icon}</div>
                            <div>
                                <div class="beast-name">${q.beast}</div>
                                <div class="beast-desc">神兽试炼 · ${isLastQuiz ? '神权之试炼' : (quizIndex===0?'智慧之试炼':'勇气之试炼')}</div>
                            </div>
                        </div>
                        <div style="font-size:18px; color:#f0dcc8; font-weight:600; margin:8px 0 16px;">${q.question}</div>
                        <div class="options" id="optionsContainer">
                            ${q.options.map((opt, idx) => `
                                <div class="option-btn" data-idx="${idx}" onclick="selectOption(${idx})">${opt}</div>
                            `).join('')}
                        </div>
                        <div id="feedbackArea" class="feedback" style="display:none;"></div>
                        <div style="margin-top:12px; display:flex; justify-content:space-between; align-items:center;">
                            <span class="badge">试炼 ${quizIndex+1}/${QUIZ.length}</span>
                            <span style="color:#7a6456; font-size:13px;">答错可重选</span>
                        </div>
                    </div>
                </div>
            `;
            isAnswering = false;
        }

        // 结局：巫王诞生
        function renderEnding() {
            container.innerHTML = `
                <div class="comic-page fade-in" style="justify-content:center; align-items:center; background:#1e1a17;">
                    <div class="poster-box" style="width:100%;">
                        <div style="font-size:72px; filter:drop-shadow(0 0 30px #b4947a);">👑</div>
                        <div class="poster-title">巫王诞生</div>
                        <div class="poster-sub">玉见神权 · 传承千年</div>
                        <div style="background:#4d3d32; border-radius:20px; padding:16px; margin:16px 0; border:1px solid #7a6456;">
                            <p style="color:#f0e2d6; line-height:1.8;">「玉见神权，遇见文明。<br>原来有些东西，从未远去。」</p>
                        </div>
                        <div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin:12px 0;">
                            <span class="badge">🐦 玉凤</span>
                            <span class="badge">🐯 玉虎</span>
                            <span class="badge">🗿 神人头像</span>
                        </div>
                        <button class="btn-primary" style="width:100%; margin-top:8px;" onclick="sharePoster()">📱 生成巫王认证海报</button>
                        <button class="btn-primary btn-secondary" style="width:100%; margin-top:8px;" onclick="resetAll()">🔄 重新体验</button>
                    </div>
                    <p style="color:#6a5546; font-size:12px; margin-top:20px;">—— 以玉为媒 · 跨越千年 ——</p>
                </div>
            `;
        }

        // ----- 交互函数 (暴露全局) -----
        window.startStory = function() {
            currentScene = 'story';
            currentStep = 0;
            render();
        };

        window.nextStory = function() {
            if (currentStep < STORY.pages.length - 1) {
                currentStep++;
                render();
            }
        };

        window.startCraft = function() {
            currentScene = 'craft';
            currentStep = 0;
            render();
        };

        window.nextCraft = function() {
            if (currentStep < STORY.crafts.length - 1) {
                currentStep++;
                render();
            }
        };

        window.startQuiz = function() {
            currentScene = 'quiz';
            quizIndex = 0;
            quizResult = [false, false, false];
            render();
        };

        window.selectOption = function(idx) {
            if (isAnswering) return;
            const q = QUIZ[quizIndex];
            const btns = document.querySelectorAll('.option-btn');
            const feedback = document.getElementById('feedbackArea');
            if (!btns.length) return;

            // 清除之前状态
            btns.forEach(b => b.classList.remove('correct', 'wrong'));

            if (idx === q.answer) {
                // 正确
                btns[idx].classList.add('correct');
                feedback.style.display = 'block';
                feedback.innerHTML = '✅ 神兽认可！获得神力！';
                feedback.style.color = '#8fc99c';
                quizResult[quizIndex] = true;
                isAnswering = true;

                setTimeout(() => {
                    quizIndex++;
                    renderQuiz();
                }, 900);
            } else {
                // 错误
                btns[idx].classList.add('wrong');
                feedback.style.display = 'block';
                feedback.innerHTML = `❌ 再想想哦～ ${q.hint || ''}`;
                feedback.style.color = '#dbb4b4';
                // 1.2s后允许重选
                isAnswering = true;
                setTimeout(() => {
                    btns.forEach(b => b.classList.remove('wrong'));
                    feedback.style.display = 'none';
                    isAnswering = false;
                }, 1200);
            }
        };

        window.sharePoster = function() {
            alert('📸 巫王认证海报已生成！\n（分享功能模拟）');
        };

        window.resetAll = function() {
            currentScene = 'intro';
            currentStep = 0;
            quizIndex = 0;
            quizResult = [false, false, false];
            isAnswering = false;
            render();
        };

        // 启动
        render();
    })();
</script>
</body>
</html>
